<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Practical Guide</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
      margin: 0;
      padding: 40px 20px;
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
    }

    h1 {
      font-size: 2.5rem;
      margin-bottom: 10px;
    }

    p {
      color: #cbd5e1;
      margin-bottom: 30px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 20px;
    }

    .card {
      background: #1e293b;
      border-radius: 16px;
      padding: 24px;
      text-decoration: none;
      color: white;
      transition: transform 0.2s ease, background 0.2s ease;
      box-shadow: 0 4px 20px rgba(0,0,0,0.25);
      display: block;
    }

    .card:hover {
      transform: translateY(-4px);
      background: #334155;
    }

    .card h2 {
      margin-top: 0;
      margin-bottom: 10px;
      font-size: 1.3rem;
    }

    .card span {
      color: #93c5fd;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>AI Practical Guide</h1>
    <p>Raccolta di strumenti e pagine pratiche dedicate al mondo AI.</p>

    <div class="grid">
      <a class="card" href="./benchmark-modelli-ai.html">
        <h2>Benchmark Modelli AI</h2>
        <p>Confronto e benchmark interattivi dei modelli AI 2025-2026.</p>
        <span>Apri pagina →</span>
      </a>

      <a class="card" href="./career-path-generator.html">
        <h2>Career Path Generator</h2>
        <p>Strumento per generare un percorso professionale nel mondo AI e tech.</p>
        <span>Apri pagina →</span>
      </a>
    </div>
  </div>
</body>
</html>
